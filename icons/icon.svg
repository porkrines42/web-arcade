<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Web Arcade Pong icon</title>
  <desc id="desc">A glowing neon Pong ball between cyan and pink paddles on a dark arcade background.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07051a"/>
      <stop offset="1" stop-color="#211049"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="28%">
      <stop stop-color="#f5ffd8"/>
      <stop offset=".35" stop-color="#bcff3f"/>
      <stop offset="1" stop-color="#6cba21"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 1h16" stroke="#fff" stroke-opacity=".045"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#background)"/>
  <rect x="18" y="18" width="476" height="476" rx="82" fill="none" stroke="#6f52a9" stroke-opacity=".55" stroke-width="4"/>
  <rect width="512" height="512" rx="96" fill="url(#scanlines)"/>
  <path d="M256 90v332" stroke="#d9cbff" stroke-opacity=".22" stroke-width="5" stroke-dasharray="13 18"/>
  <rect x="104" y="156" width="34" height="200" rx="17" fill="#22e6ff" filter="url(#glow)"/>
  <rect x="374" y="156" width="34" height="200" rx="17" fill="#ff3ed1" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="47" fill="#bcff3f" opacity=".32" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="30" fill="url(#ball)" filter="url(#glow)"/>
  <path d="M78 102h78M356 410h78" stroke="#bcff3f" stroke-linecap="round" stroke-opacity=".55" stroke-width="6"/>
</svg>
